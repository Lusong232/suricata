name: 多平台编译 Suricata

on:
  push:
    tags:
      - 'v*'                   # 当你推送一个 v1.0.0 格式的标签时，自动触发编译
  workflow_dispatch:           # 也支持在 GitHub 网页上手动触发

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            package_ext: deb
            archive_name: suricata-linux-x86_64
          - os: windows-latest
            target: windows
            package_ext: zip
            archive_name: suricata-windows-x86_64
          - os: macos-latest
            target: macos
            package_ext: zip
            archive_name: suricata-macos-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      # --- 第一步：获取代码 ---
      - name: 检出代码
        uses: actions/checkout@v4

      # --- 第二步：开始编译 ---
      # Linux 编译步骤
      - name: Linux - 安装依赖并编译
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool \
            libpcap-dev libpcre3-dev libyaml-dev libnet1-dev libcap-ng-dev \
            libjansson-dev pkg-config rustc cargo

          ./autogen.sh
          ./configure --prefix=/usr --disable-gccmarch-native --enable-non-bundled-htp
          make -j$(nproc)
          make install DESTDIR=/tmp/suricata

          # 组织并打包产物
          cd /tmp
          tar -czf ${{ matrix.archive_name }}.tar.gz suricata/usr

      # Windows 编译步骤
      - name: Windows - 安装 MSYS2 并编译
        if: matrix.target == 'windows'
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm autoconf automake git make \
            mingw-w64-ucrt-x86_64-cbindgen mingw-w64-ucrt-x86_64-jansson \
            mingw-w64-ucrt-x86_64-libpcap mingw-w64-ucrt-x86_64-libtool \
            mingw-w64-ucrt-x86_64-libyaml mingw-w64-ucrt-x86_64-pcre2 \
            mingw-w64-ucrt-x86_64-rust mingw-w64-ucrt-x86_64-toolchain unzip

          ./autogen.sh
          ./configure --prefix=/usr/local --disable-gccmarch-native
          make -j$(nproc)
          make install DESTDIR=/tmp/suricata

          cd /tmp
          7z a -tzip ${{ matrix.archive_name }}.zip suricata/usr/local

      # macOS 编译步骤
      - name: macOS - 安装依赖并编译
        if: matrix.target == 'macos'
        run: |
          brew install autoconf automake libtool jansson libmagic libnet libpcap \
            libyaml pcre2 pkg-config rust

          ./autogen.sh
          ./configure --prefix=/usr/local --disable-gccmarch-native
          make -j$(sysctl -n hw.ncpu)
          make install DESTDIR=/tmp/suricata

          cd /tmp
          tar -czf ${{ matrix.archive_name }}.tar.gz suricata/usr/local

      # --- 第三步：上传产物 ---
      - name: 上传二进制包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            *.tar.gz
            *.zip
