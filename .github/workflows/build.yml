name: Multi-Platform Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ============================================================
  #  Ubuntu 22.04 和 24.04 原生构建（资源充足）
  # ============================================================
  build-ubuntu:
    name: Ubuntu ${{ matrix.ubuntu_version }}
    runs-on: ubuntu-${{ matrix.ubuntu_version }}
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version: ['22.04', '24.04']   # 20.04 已改为 Docker 构建
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool \
            gcc make pkg-config \
            libpcre2-dev libnet1-dev libyaml-dev zlib1g-dev \
            libcap-ng-dev libmagic-dev libevent-dev \
            libnetfilter-queue-dev libnetfilter-log-dev \
            libnfnetlink-dev libjansson-dev \
            libhiredis-dev liblz4-dev libhyperscan-dev \
            libpcap-dev \
            python3 python3-pip curl ca-certificates

      - name: Install Rust via rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cbindgen
        run: |
          source $HOME/.cargo/env
          cargo install cbindgen --version 0.28.0

      - name: Generate configure script
        run: ./autogen.sh

      - name: Configure
        run: ./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var --enable-nfqueue --enable-hyperscan

      - name: Build
        run: make -j$(nproc)

      - name: Install to temporary directory
        run: make install DESTDIR=$(pwd)/install

      - name: Package binary
        id: package
        run: |
          cd install
          tar -czf ../suricata-${{ github.ref_name }}-ubuntu-${{ matrix.ubuntu_version }}-x86_64.tar.gz .
          echo "artifact_name=suricata-${{ github.ref_name }}-ubuntu-${{ matrix.ubuntu_version }}-x86_64.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suricata-ubuntu-${{ matrix.ubuntu_version }}
          path: ${{ steps.package.outputs.artifact_name }}
          retention-days: 7

  # ============================================================
  #  Docker 容器构建（覆盖更多 Linux 发行版）
  # ============================================================
  build-docker:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --------------- Ubuntu 20.04 (Docker) ---------------
          - distro: ubuntu-20.04
            image: ubuntu:20.04
            install_cmd: |
              apt-get update && apt-get install -y --no-install-recommends \
                autoconf automake libtool gcc g++ make pkg-config \
                libpcre2-dev libnet1-dev libyaml-dev zlib1g-dev \
                libcap-ng-dev libmagic-dev libevent-dev \
                libnetfilter-queue-dev libnetfilter-log-dev \
                libnfnetlink-dev libjansson-dev \
                libhiredis-dev liblz4-dev libhyperscan-dev libpcap-dev \
                python3 python3-pip curl ca-certificates && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            configure_opts: --prefix=/usr --sysconfdir=/etc --localstatedir=/var --enable-nfqueue --enable-hyperscan

          # ----------------- Debian 11 -----------------
          - distro: debian-11
            image: debian:11
            install_cmd: |
              apt-get update && apt-get install -y --no-install-recommends \
                autoconf automake libtool gcc g++ make pkg-config \
                libpcre2-dev libnet1-dev libyaml-dev zlib1g-dev \
                libcap-ng-dev libmagic-dev libevent-dev \
                libnetfilter-queue-dev libnetfilter-log-dev \
                libnfnetlink-dev libjansson-dev \
                libhiredis-dev liblz4-dev libpcap-dev \
                python3 python3-pip curl ca-certificates && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            configure_opts: --prefix=/usr --sysconfdir=/etc --localstatedir=/var --enable-nfqueue

          # ----------------- Debian 12 -----------------
          - distro: debian-12
            image: debian:12
            install_cmd: |
              apt-get update && apt-get install -y --no-install-recommends \
                autoconf automake libtool gcc g++ make pkg-config \
                libpcre2-dev libnet1-dev libyaml-dev zlib1g-dev \
                libcap-ng-dev libmagic-dev libevent-dev \
                libnetfilter-queue-dev libnetfilter-log-dev \
                libnfnetlink-dev libjansson-dev \
                libhiredis-dev liblz4-dev libhyperscan-dev libpcap-dev \
                python3 python3-pip curl ca-certificates && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            configure_opts: --prefix=/usr --sysconfdir=/etc --localstatedir=/var --enable-nfqueue --enable-hyperscan

          # ----------------- Rocky Linux 8 -----------------
          - distro: rockylinux-8
            image: rockylinux:8
            install_cmd: |
              dnf -y install epel-release dnf-plugins-core && \
              dnf config-manager --set-enabled powertools && \
              dnf -y install \
                autoconf automake libtool gcc gcc-c++ make pkgconfig \
                pcre2-devel libnet-devel libyaml-devel zlib-devel \
                libcap-ng-devel file-devel libevent-devel \
                libnetfilter_queue-devel libnfnetlink-devel jansson-devel \
                hiredis-devel lz4-devel libpcap-devel which python3 python3-pip curl && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            configure_opts: --prefix=/usr --sysconfdir=/etc --localstatedir=/var --enable-nfqueue

          # ----------------- Rocky Linux 9 -----------------
          - distro: rockylinux-9
            image: rockylinux:9
            install_cmd: |
              dnf -y install epel-release && dnf --enablerepo=crb -y install \
                autoconf automake libtool gcc gcc-c++ make pkgconfig \
                pcre2-devel libnet-devel libyaml-devel zlib-devel \
                libcap-ng-devel file-devel libevent-devel \
                libnetfilter_queue-devel libnfnetlink-devel jansson-devel \
                hiredis-devel lz4-devel libpcap-devel which python3 python3-pip && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            configure_opts: --prefix=/usr --sysconfdir=/etc --localstatedir=/var --enable-nfqueue

          # ----------------- Fedora 39 -----------------
          - distro: fedora-39
            image: fedora:39
            install_cmd: |
              dnf -y install \
                autoconf automake libtool gcc gcc-c++ make pkgconfig \
                pcre2-devel libnet-devel libyaml-devel zlib-devel \
                libcap-ng-devel file-devel libevent-devel \
                libnetfilter_queue-devel libnfnetlink-devel jansson-devel \
                hiredis-devel lz4-devel hyperscan-devel libpcap-devel \
                which python3 python3-pip curl && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            configure_opts: --prefix=/usr --sysconfdir=/etc --localstatedir=/var --enable-nfqueue --enable-hyperscan

    steps:
      - uses: actions/checkout@v4

      - name: Build in Docker (${{ matrix.distro }})
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ${{ matrix.image }} bash -c "
            set -e
            ${{ matrix.install_cmd }}
            source \$HOME/.cargo/env
            cargo install cbindgen --version 0.28.0
            export PATH=\$HOME/.cargo/bin:\$PATH
            ./autogen.sh
            ./configure ${{ matrix.configure_opts }}
            make -j\$(nproc)
            make install DESTDIR=/workspace/install
          "

      - name: Package binary
        id: package
        run: |
          cd install
          tar -czf ../suricata-${{ github.ref_name }}-${{ matrix.distro }}-x86_64.tar.gz .
          echo "artifact_name=suricata-${{ github.ref_name }}-${{ matrix.distro }}-x86_64.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suricata-${{ matrix.distro }}
          path: ${{ steps.package.outputs.artifact_name }}
          retention-days: 7

  # ============================================================
  #  发布 Release（仅当推送 tag 时运行）
  # ============================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-ubuntu, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Suricata ${{ github.ref_name }}
          body: |
            ## Suricata ${{ github.ref_name }} 多平台二进制包

            选择与你的系统对应的压缩包下载，解压后即可运行（需系统已安装运行时库）。

            ### 平台对应表
            | 文件名 | 目标系统 |
            |--------|----------|
            | `suricata-*-ubuntu-20.04-x86_64.tar.gz` | Ubuntu 20.04 LTS |
            | `suricata-*-ubuntu-22.04-x86_64.tar.gz` | Ubuntu 22.04 LTS |
            | `suricata-*-ubuntu-24.04-x86_64.tar.gz` | Ubuntu 24.04 LTS |
            | `suricata-*-debian-11-x86_64.tar.gz`   | Debian 11 (Bullseye) |
            | `suricata-*-debian-12-x86_64.tar.gz`   | Debian 12 (Bookworm) |
            | `suricata-*-rockylinux-8-x86_64.tar.gz`| Rocky Linux 8 / RHEL 8 |
            | `suricata-*-rockylinux-9-x86_64.tar.gz`| Rocky Linux 9 / RHEL 9 |
            | `suricata-*-fedora-39-x86_64.tar.gz`   | Fedora 39 |

            > **注意**：部分平台未启用 Hyperscan（如 Debian 11、Rocky 8/9），其他特性均开启。

            ### 使用方法
            ```bash
            tar -xzf suricata-<version>-<platform>.tar.gz
            sudo cp -r usr/* /usr/
            sudo cp -r etc/* /etc/
            suricata --build-info
          
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
