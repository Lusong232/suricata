name: 多平台编译 Suricata

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            archive_name: suricata-linux-x86_64
          - os: windows-latest
            target: windows
            archive_name: suricata-windows-x86_64
          - os: macos-latest
            target: macos
            archive_name: suricata-macos-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ---------- Linux 编译 ----------
      - name: Linux - 安装依赖并编译
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool \
            libpcap-dev libpcre3-dev libyaml-dev libnet1-dev \
            libcap-ng-dev libjansson-dev pkg-config \
            rustc cargo \
            libmagic-dev libunwind-dev

          # 安装 cbindgen（必须）
          cargo install --force cbindgen

          ./autogen.sh
          ./configure \
            --prefix=/usr \
            --disable-gccmarch-native \
            --enable-non-bundled-htp
          make -j$(nproc)
          make install DESTDIR=/tmp/suricata

          cd /tmp
          tar -czf ${{ matrix.archive_name }}.tar.gz suricata

      # ---------- Windows 编译 ----------
      - name: Windows - 安装 MSYS2 环境
        if: matrix.target == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            autoconf automake git make
            mingw-w64-ucrt-x86_64-cbindgen
            mingw-w64-ucrt-x86_64-jansson
            mingw-w64-ucrt-x86_64-libpcap
            mingw-w64-ucrt-x86_64-libtool
            mingw-w64-ucrt-x86_64-libyaml
            mingw-w64-ucrt-x86_64-pcre2
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-toolchain
            unzip

      - name: Windows - 编译 Suricata
        if: matrix.target == 'windows'
        shell: msys2 {0}
        run: |
          ./autogen.sh
          ./configure --prefix=/usr/local --disable-gccmarch-native
          make -j$(nproc)
          make install DESTDIR=/tmp/suricata

          cd /tmp
          7z a -tzip ${{ matrix.archive_name }}.zip suricata

      # ---------- macOS 编译 ----------
      - name: macOS - 安装依赖并编译
        if: matrix.target == 'macos'
        run: |
          brew install autoconf automake libtool \
            jansson libmagic libnet libpcap libyaml pcre2 pkg-config rust

          # 安装 cbindgen
          cargo install --force cbindgen

          ./autogen.sh
          ./configure --prefix=/usr/local --disable-gccmarch-native
          make -j$(sysctl -n hw.ncpu)
          make install DESTDIR=/tmp/suricata

          cd /tmp
          tar -czf ${{ matrix.archive_name }}.tar.gz suricata

      # ---------- 上传产物 ----------
      - name: 上传二进制包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: |
            *.tar.gz
            *.zip
